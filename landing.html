<!-- Lightweight JS for Atmosphere & Interaction -->
<script>
        // Generate floating data particles
        const container = document.getElementById('particles-container');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Random properties
            const size = Math.random() * 4 + 1; // 1px to 5px
            const left = Math.random() * 100; // 0% to 100vw
            const top = Math.random() * 100 + 100; // Start below screen
            const duration = Math.random() * 10 + 5; // 5s to 15s
            const delay = Math.random() * 5; // 0s to 5s
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}vw`;
            particle.style.top = `${top}vh`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${delay}s`;
            
            container.appendChild(particle);
        }

        // Ripple Effect Function
        function createRipple(event) {
            const button = event.currentTarget;
            
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            
            // Calculate relative position based on viewport click
            const rect = button.getBoundingClientRect();
            const x = event.clientX - rect.left - radius;
            const y = event.clientY - rect.top - radius;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
            circle.classList.add("ripple");
            
            // Remove existing ripples
            const ripple = button.getElementsByClassName("ripple")[0];
            if (ripple) {
                ripple.remove();
            }
            
            button.appendChild(circle);
            
            // Redirect to Streamlit Dashboard after ripple animation
            setTimeout(() => {
                window.parent.location.href = "/?booted=true";
            }, 500);
        }

        // --- THREE.JS 3D CYBER SPHERE ANIMATION ---
        const initThreeJS = () => {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            
            // Render centered on the shield container
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(1000, 1000); // Fixed size large enough to overlap text
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '50%';
            renderer.domElement.style.left = '50%';
            renderer.domElement.style.transform = 'translate(-50%, -50%)';
            renderer.domElement.style.zIndex = '-1'; // Behind the shield lock (z-10) but above text due to parent z-50
            renderer.domElement.style.pointerEvents = 'none'; // Allow clicking through
            document.getElementById('shield-container').appendChild(renderer.domElement);

            // Create Geometric Cyber Sphere
            const geometry = new THREE.IcosahedronGeometry(2.5, 1);
            
            // Wireframe material glowing cyan
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00f5ff, 
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            const sphere = new THREE.Mesh(geometry, material);
            // sphere.position.y = 0.5; // Removed: Now perfectly centered on the shield container
            scene.add(sphere);

            // Particles around sphere
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 200;
            const posArray = new Float32Array(particleCount * 3);
            for(let i=0; i<particleCount*3; i++) {
                posArray[i] = (Math.random() - 0.5) * 15;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particleMat = new THREE.PointsMaterial({
                size: 0.05,
                color: 0xb44fff,
                transparent: true,
                opacity: 0.4
            });
            const particlesMesh = new THREE.Points(particleGeo, particleMat);
            scene.add(particlesMesh);

            camera.position.z = 7;

            // Mouse interaction
            let mouseX = 0;
            let mouseY = 0;
            let targetX = 0;
            let targetY = 0;
            const windowHalfX = window.innerWidth / 2;
            const windowHalfY = window.innerHeight / 2;

            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX - windowHalfX);
                mouseY = (event.clientY - windowHalfY);
            });

            // Animation Loop
            const animate = () => {
                requestAnimationFrame(animate);

                targetX = mouseX * 0.001;
                targetY = mouseY * 0.001;

                // Smooth rotation towards mouse
                sphere.rotation.y += 0.05 * (targetX - sphere.rotation.y);
                sphere.rotation.x += 0.05 * (targetY - sphere.rotation.x);
                
                // Continuous slow rotation
                sphere.rotation.z += 0.002;
                particlesMesh.rotation.y -= 0.001;
                particlesMesh.rotation.x += 0.0005;

                // Pulsate sphere
                const scale = 1 + Math.sin(Date.now() * 0.002) * 0.05;
                sphere.scale.set(scale, scale, scale);

                renderer.render(scene, camera);
            };

            animate();

            // Handle Resize - No need to resize canvas as it's a fixed centered element now
            // window.addEventListener('resize', () => { ... });
        };

        // Initialize 3D when DOM is ready
        document.addEventListener('DOMContentLoaded', initThreeJS);

        // --- TRAILING CURSOR EFFECT ---
        const initCursorTrail = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);

            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;

            const cursor = { x: width / 2, y: height / 2 };
            const trail = [];
            const trailLength = 20;

            document.addEventListener('mousemove', (e) => {
                cursor.x = e.clientX;
                cursor.y = e.clientY;
            });

            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });

            function animateTrail() {
                ctx.clearRect(0, 0, width, height);

                trail.push({ x: cursor.x, y: cursor.y });
                if (trail.length > trailLength) trail.shift();

                ctx.beginPath();
                for (let i = 0; i < trail.length; i++) {
                    const point = trail[i];
                    if (i === 0) {
                        ctx.moveTo(point.x, point.y);
                    } else {
                        // Smooth curve
                        const prevPoint = trail[i - 1];
                        const xc = (prevPoint.x + point.x) / 2;
                        const yc = (prevPoint.y + point.y) / 2;
                        ctx.quadraticCurveTo(prevPoint.x, prevPoint.y, xc, yc);
                    }
                }
                ctx.lineTo(cursor.x, cursor.y);
                
                ctx.strokeStyle = 'rgba(0, 245, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // Add glow to the trail
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f5ff';
                
                ctx.stroke();

                requestAnimationFrame(animateTrail);
            }
            animateTrail();
        };
        initCursorTrail();

    </script>
